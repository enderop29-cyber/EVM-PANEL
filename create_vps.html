{% extends "base.html" %}
{% block title %}Create VPS — LVM Panel{% endblock %}
{% block header %}Create a New VPS{% endblock %}
{% block subheader %}Configure resources and assign it to a user{% endblock %}

{% block content %}
<div class="card" style="max-width:640px;">
    <form method="post">
        <div class="form-group">
            <label>VPS Name</label>
            <input class="form-control" type="text" name="name" placeholder="e.g. Bot Hosting VPS" required>
        </div>

        <div class="form-group">
            <label>Assign to User</label>
            <select class="form-control" name="owner_id" required>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.username }}{% if u.is_admin %} (admin){% endif %}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>RAM (GB)</label>
                <input class="form-control" type="number" name="ram" min="1" value="2" required>
            </div>
            <div class="form-group">
                <label>CPU (vCores)</label>
                <input class="form-control" type="number" name="cpu" min="1" value="1" required>
            </div>
            <div class="form-group">
                <label>Disk (GB)</label>
                <input class="form-control" type="number" name="disk" min="5" value="10" required>
            </div>
        </div>

        <div class="form-row" style="grid-template-columns: 1fr 1fr;">
            <div class="form-group">
                <label>Operating System</label>
                <select class="form-control" name="os_image">
                    {% for img in os_images %}
                    <option value="{{ img }}">{{ img }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Duration (days, 0 = unlimited)</label>
                <input class="form-control" type="number" name="days" min="0" value="30" required>
            </div>
        </div>

        <button class="btn btn-primary btn-block" type="submit">Create VPS</button>
    </form>
</div>
{% endblock %}
